name: release
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build'
        required: false
        default: ''
  schedule:
    - cron: '0 10 * * *'

env:
  APP_NAME: tailwindcss-oxide
  NODE_VERSION: 24
  PNPM_VERSION: '11.9.0'
  OXIDE_LOCATION: ./crates/node

jobs:
  check:
    runs-on: ubuntu-slim
    outputs:
      version: ${{ steps.get-version.outputs.version }}
      build: ${{ steps.check-build.outputs.build }}
    steps:
      - name: Check Version
        id: get-version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            version="${{ inputs.version }}"
          else
            version=$(curl -s 'https://api.github.com/repos/tailwindlabs/tailwindcss/releases/latest' | jq -r ".tag_name")
          fi
          echo "Current Version: ${version}"
          if [ -z "${version}" ] || [ "${version}" == "null" ]; then
            echo "Failed to get version"
            exit 1
          fi
          echo "version=${version}" >> $GITHUB_ENV
          echo "version=${version}" >> $GITHUB_OUTPUT

      - name: Check Build
        id: check-build
        run: |
          gh release view ${version} -R ${{ github.repository }} >/dev/null 2>&1 || echo "build=1" >> $GITHUB_OUTPUT
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: windows-latest
            target: aarch64-pc-windows-msvc
          # macOS
          - os: macos-latest
            target: x86_64-apple-darwin
            strip: strip -x # Must use -x on macOS. This produces larger results on linux.
          - os: macos-latest
            target: aarch64-apple-darwin
            page-size: 14
            strip: strip -x # Must use -x on macOS. This produces larger results on linux.
          # Android
          - os: ubuntu-latest
            target: aarch64-linux-android
            strip: ${ANDROID_NDK_LATEST_HOME}/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-strip
          - os: ubuntu-latest
            target: armv7-linux-androideabi
            strip: ${ANDROID_NDK_LATEST_HOME}/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-strip
          # Linux
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            strip: strip
            build-flags: --use-napi-cross
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            strip: aarch64-linux-gnu-strip
            build-flags: --use-napi-cross
          - os: ubuntu-latest
            target: armv7-unknown-linux-gnueabihf
            strip: arm-linux-gnueabihf-strip
            build-flags: --use-napi-cross
          - os: ubuntu-latest
            target: loongarch64-unknown-linux-gnu
            strip: loongarch64-linux-gnu-strip
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            strip-zig: true
            build-flags: -x
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            strip: strip
            build-flags: -x
          - os: ubuntu-latest
            target: loongarch64-unknown-linux-musl
            strip-zig: true
            build-flags: -x

    name: Build ${{ matrix.target }} (oxide)
    runs-on: ${{ matrix.os }}
    needs:
      - check
    if: needs.check.outputs.build == '1'
    env:
      version: ${{ needs.check.outputs.version }}
    steps:
      - uses: actions/checkout@v6
        with:
          repository: tailwindlabs/tailwindcss
          ref: ${{ env.version }}

      - uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Use Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install gcc-arm-linux-gnueabihf
        if: ${{ matrix.target == 'armv7-unknown-linux-gnueabihf' }}
        run: |
          sudo apt-get update
          sudo apt-get install gcc-arm-linux-gnueabihf g++-arm-linux-gnueabihf -y

      - name: Install binutils-aarch64-linux-gnu
        if: ${{ matrix.target == 'aarch64-unknown-linux-gnu' }}
        run: |
          sudo apt-get update
          sudo apt-get install binutils-aarch64-linux-gnu -y

      - name: Install gcc-loongarch64-linux-gnu
        if: ${{ matrix.target == 'loongarch64-unknown-linux-gnu' }}
        run: |
          sudo apt-get update
          sudo apt-get install binutils-loongarch64-linux-gnu gcc-13-loongarch64-linux-gnu -y
          sudo update-alternatives \
            --install /usr/bin/loongarch64-linux-gnu-gcc loongarch64-linux-gnu-gcc /usr/bin/loongarch64-linux-gnu-gcc-13 100 \
            --slave /usr/bin/loongarch64-linux-gnu-gcc-ar loongarch64-linux-gnu-gcc-ar /usr/bin/loongarch64-linux-gnu-gcc-ar-13 \
            --slave /usr/bin/loongarch64-linux-gnu-gcc-nm loongarch64-linux-gnu-gcc-nm /usr/bin/loongarch64-linux-gnu-gcc-nm-13 \
            --slave /usr/bin/loongarch64-linux-gnu-gcc-ranlib loongarch64-linux-gnu-gcc-ranlib /usr/bin/loongarch64-linux-gnu-gcc-ranlib-13 \
            --slave /usr/bin/loongarch64-linux-gnu-gcov loongarch64-linux-gnu-gcov /usr/bin/loongarch64-linux-gnu-gcov-13
          sudo update-alternatives \
            --install /usr/bin/loongarch64-linux-gnu-cpp loongarch64-linux-gnu-cpp /usr/bin/loongarch64-linux-gnu-cpp-13 100

      - name: Prepare build
        if: matrix.os == 'ubuntu-latest'
        run: |
          wget -qO - https://github.com/${{ github.repository }}/raw/refs/heads/main/patch_loong64.patch | patch -p1
          cp -R ${{ env.OXIDE_LOCATION }}/npm/linux-arm64-gnu ${{ env.OXIDE_LOCATION }}/npm/linux-loong64-gnu 
          cp -R ${{ env.OXIDE_LOCATION }}/npm/linux-arm64-musl ${{ env.OXIDE_LOCATION }}/npm/linux-loong64-musl
          sed -i 's/aarch64/loongarch64/g' ${{ env.OXIDE_LOCATION }}/npm/linux-loong64-musl/*
          sed -i 's/arm64/loong64/g' ${{ env.OXIDE_LOCATION }}/npm/linux-loong64-gnu/*

      - uses: mlugg/setup-zig@v2
        if: ${{ contains(matrix.target, 'musl') }}
        with:
          version: 0.14.1
          use-cache: false

      - name: Install cargo-zigbuild
        uses: taiki-e/install-action@v2
        if: ${{ contains(matrix.target, 'musl') }}
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          tool: cargo-zigbuild

      - name: Setup rust target
        run: rustup target add ${{ matrix.target }}

      - name: Install dependencies
        run: pnpm install --ignore-scripts --frozen-lockfile --filter=!./playgrounds/*

      - name: Build release
        run: pnpm run --filter ${{ env.OXIDE_LOCATION }} build:platform --target=${{ matrix.target }} ${{ matrix.build-flags }}
        env:
          RUST_TARGET: ${{ matrix.target }}
          JEMALLOC_SYS_WITH_LG_PAGE: ${{ matrix.page-size }}

      - name: Strip debug symbols # https://github.com/rust-lang/rust/issues/46034
        if: ${{ matrix.strip || matrix.strip-zig }}
        env:
          STRIP_COMMAND: ${{ matrix.strip }}
          STRIP_ZIG: ${{ matrix.strip-zig }}
        run: |
          if [ "$STRIP_ZIG" = "true" ]; then
            for file in ${{ env.OXIDE_LOCATION }}/*.node; do
              zig objcopy --strip-all "$file" "$file.stripped"
              mv "$file.stripped" "$file"
            done
            exit 0
          fi

          eval "$STRIP_COMMAND ${{ env.OXIDE_LOCATION }}/*.node"

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: bindings-${{ matrix.target }}
          path: ${{ env.OXIDE_LOCATION }}/*.node

  build-freebsd:
    name: Build x86_64-unknown-freebsd (OXIDE)
    runs-on: ubuntu-latest
    needs:
      - check
    if: needs.check.outputs.build == '1'
    env:
      version: ${{ needs.check.outputs.version }}
    steps:
      - uses: actions/checkout@v6
        with:
          repository: tailwindlabs/tailwindcss
          ref: ${{ env.version }}
      - name: Build FreeBSD
        uses: cross-platform-actions/action@cdc9ee69ef84a5f2e59c9058335d9c57bcb4ac86 # v0.25.0
        env:
          DEBUG: napi:*
          RUSTUP_HOME: /usr/local/rustup
          CARGO_HOME: /usr/local/cargo
          RUSTUP_IO_THREADS: 1
          RUST_TARGET: x86_64-unknown-freebsd
        with:
          operating_system: freebsd
          version: '14.0'
          memory: 13G
          cpu_count: 3
          environment_variables: 'DEBUG RUSTUP_IO_THREADS'
          shell: bash
          run: |
            sudo pkg install -y -f curl node libnghttp2 npm
            sudo npm install -g pnpm@${{ env.PNPM_VERSION }} --unsafe-perm=true
            curl -sSf https://static.rust-lang.org/rustup/archive/1.27.1/x86_64-unknown-freebsd/rustup-init --output rustup-init
            chmod +x rustup-init
            ./rustup-init -y --profile minimal
            source "$HOME/.cargo/env"
            echo "~~~~ rustc --version ~~~~"
            rustc --version
            echo "~~~~ node -v ~~~~"
            node -v
            echo "~~~~ pnpm --version ~~~~"
            pnpm --version
            pnpm install --ignore-scripts --frozen-lockfile --filter=!./playgrounds/* || true
            pnpm run --filter ${{ env.OXIDE_LOCATION }} build:platform
            strip -x ${{ env.OXIDE_LOCATION }}/*.node
            ls -la ${{ env.OXIDE_LOCATION }}
      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: bindings-x86_64-unknown-freebsd
          path: ${{ env.OXIDE_LOCATION }}/*.node

  release:
    runs-on: macos-14
    name: Build and publish Tailwind CSS

    permissions:
      contents: write
      # https://docs.npmjs.com/generating-provenance-statements#publishing-packages-with-provenance-via-github-actions
      id-token: write

    needs:
      - check
      - build
    if: needs.check.outputs.build == '1'

    env:
      version: ${{ needs.check.outputs.version }}

    steps:
      - uses: actions/checkout@v6
        with:
          repository: tailwindlabs/tailwindcss
          ref: ${{ env.version }}

      - name: Prepare build
        run: |
          wget -qO - https://github.com/${{ github.repository }}/raw/refs/heads/main/patch_loong64.patch | patch -p1
          cp -R ${{ env.OXIDE_LOCATION }}/npm/linux-arm64-gnu ${{ env.OXIDE_LOCATION }}/npm/linux-loong64-gnu 
          cp -R ${{ env.OXIDE_LOCATION }}/npm/linux-arm64-musl ${{ env.OXIDE_LOCATION }}/npm/linux-loong64-musl
          perl -pi -e 's/arm64/loong64/g' ${{ env.OXIDE_LOCATION }}/npm/linux-loong64-gnu/package.json ${{ env.OXIDE_LOCATION }}/npm/linux-loong64-gnu/README.md
          perl -pi -e 's/aarch64/loongarch64/g; s/arm64/loong64/g' ${{ env.OXIDE_LOCATION }}/npm/linux-loong64-musl/package.json ${{ env.OXIDE_LOCATION }}/npm/linux-loong64-musl/README.md

      - uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Use Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      # npm trusted publishing validates the caller workflow filename, so all npm publishes live here.
      # This workflow rebuilds the publish artifacts instead of depending on prepare-release.yml.
      - name: Resolve release metadata
        env:
          INPUT_CHANNEL: "release"
        run: |
          if [[ "${{ github.event_name }}" == "release" || "$INPUT_CHANNEL" == "release" ]]; then
            release_channel=$(node ./scripts/release-channel.js)

            echo "RELEASE_KIND=release" >> $GITHUB_ENV
            echo "RELEASE_CHANNEL=$release_channel" >> $GITHUB_ENV
            echo "FEATURES_ENV=stable" >> $GITHUB_ENV
          else
            sha_short=$(git rev-parse --short HEAD)

            echo "RELEASE_KIND=insiders" >> $GITHUB_ENV
            echo "RELEASE_CHANNEL=insiders" >> $GITHUB_ENV
            echo "SHA_SHORT=$sha_short" >> $GITHUB_ENV
            echo "INSIDERS_VERSION=0.0.0-insiders.$sha_short" >> $GITHUB_ENV
          fi

      - name: Setup WASM target
        run: rustup target add wasm32-wasip1-threads

      - name: Install dependencies
        run: pnpm --filter=!./playgrounds/* install --frozen-lockfile

      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: ${{ env.OXIDE_LOCATION }}

      - name: Move artifacts
        run: |
          cd ${{ env.OXIDE_LOCATION }}
          cp bindings-x86_64-pc-windows-msvc/* ./npm/win32-x64-msvc/
          cp bindings-aarch64-pc-windows-msvc/* ./npm/win32-arm64-msvc/
          cp bindings-x86_64-apple-darwin/* ./npm/darwin-x64/
          cp bindings-aarch64-apple-darwin/* ./npm/darwin-arm64/
          cp bindings-aarch64-linux-android/* ./npm/android-arm64/
          cp bindings-armv7-linux-androideabi/* ./npm/android-arm-eabi/
          cp bindings-aarch64-unknown-linux-gnu/* ./npm/linux-arm64-gnu/
          cp bindings-aarch64-unknown-linux-musl/* ./npm/linux-arm64-musl/
          cp bindings-armv7-unknown-linux-gnueabihf/* ./npm/linux-arm-gnueabihf/
          cp bindings-loongarch64-unknown-linux-gnu/* ./npm/linux-loong64-gnu/
          cp bindings-loongarch64-unknown-linux-musl/* ./npm/linux-loong64-musl/
          cp bindings-x86_64-unknown-linux-gnu/* ./npm/linux-x64-gnu/
          cp bindings-x86_64-unknown-linux-musl/* ./npm/linux-x64-musl/
          cp bindings-x86_64-unknown-freebsd/* ./npm/freebsd-x64/

      - name: 'Version based on commit: ${{ env.INSIDERS_VERSION }}'
        if: env.RELEASE_KIND == 'insiders'
        run: pnpm run version-packages ${INSIDERS_VERSION}

      - name: Build Tailwind CSS
        if: env.RELEASE_KIND == 'insiders'
        run: pnpm run build

      - name: Build Tailwind CSS
        if: env.RELEASE_KIND == 'release'
        run: pnpm run build
        env:
          FEATURES_ENV: ${{ env.FEATURES_ENV }}

      - name: Run pre-publish optimizations scripts
        run: node ./scripts/pre-publish-optimizations.mjs

      - name: Lock pre-release versions
        run: node ./scripts/lock-pre-release-versions.mjs

      - name: Upload npm package tarballs
        uses: actions/upload-artifact@v7
        with:
          name: npm-package-tarballs
          path: dist/*.tgz

      - name: Publish
        run: |
          pnpm --recursive --filter="!@tailwindcss/oxide-wasm32-wasi" publish --tag ${RELEASE_CHANNEL} --no-git-checks --dry-run
          # The wasm package needs a special npm config that isn't read when pnpm --recursive is used
          pushd crates/node/npm/wasm32-wasi; pnpm publish --tag ${RELEASE_CHANNEL} --no-git-checks --config.node-linker=hoisted --dry-run; popd;

      - name: Make artifacts
        run: |
          mkdir -p release-assets
          find . -name "*.tgz" -exec mv {} release-assets/ \;
          find release-assets/ -type f -name "tailwindcss-oxide-*" ! -name "*loong64-*" -delete
          ls -lh release-assets/

      - name: Create release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG_NAME="${version}"
          gh release create "${TAG_NAME}" \
            --repo ${{ github.repository }} \
            --generate-notes \
            --title "${TAG_NAME}" \
            release-assets/*

  publish:
    runs-on: macos-14
    name: Build and publish Tailwind CSS

    permissions:
      contents: write
      # https://docs.npmjs.com/generating-provenance-statements#publishing-packages-with-provenance-via-github-actions
      id-token: write

    needs:
      - check
      - build
    if: needs.check.outputs.build == '1'

    env:
      version: ${{ needs.check.outputs.version }}

    steps:
      - uses: actions/checkout@v6
        with:
          repository: tailwindlabs/tailwindcss
          ref: ${{ env.version }}

      - name: Prepare build
        run: |
          wget -qO - https://github.com/${{ github.repository }}/raw/refs/heads/main/patch_loong64.patch | patch -p1
          cp -R ${{ env.OXIDE_LOCATION }}/npm/linux-arm64-gnu ${{ env.OXIDE_LOCATION }}/npm/linux-loong64-gnu 
          cp -R ${{ env.OXIDE_LOCATION }}/npm/linux-arm64-musl ${{ env.OXIDE_LOCATION }}/npm/linux-loong64-musl
          perl -pi -e 's/arm64/loong64/g' ${{ env.OXIDE_LOCATION }}/npm/linux-loong64-gnu/package.json ${{ env.OXIDE_LOCATION }}/npm/linux-loong64-gnu/README.md
          perl -pi -e 's/aarch64/loongarch64/g; s/arm64/loong64/g' ${{ env.OXIDE_LOCATION }}/npm/linux-loong64-musl/package.json ${{ env.OXIDE_LOCATION }}/npm/linux-loong64-musl/README.md

          find "${{ env.OXIDE_LOCATION }}/npm" -name package.json -exec sed -i "" 's#"name": "@tailwindcss/#"name": "@loong64/#g' {} +
          find "${{ env.OXIDE_LOCATION }}/npm" -name package.json -exec sed -i "" 's#github.com/tailwindlabs#github.com/loong64#g' {} +

      - uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Use Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      # npm trusted publishing validates the caller workflow filename, so all npm publishes live here.
      # This workflow rebuilds the publish artifacts instead of depending on prepare-release.yml.
      - name: Resolve release metadata
        env:
          INPUT_CHANNEL: "release"
        run: |
          if [[ "${{ github.event_name }}" == "release" || "$INPUT_CHANNEL" == "release" ]]; then
            release_channel=$(node ./scripts/release-channel.js)

            echo "RELEASE_KIND=release" >> $GITHUB_ENV
            echo "RELEASE_CHANNEL=$release_channel" >> $GITHUB_ENV
            echo "FEATURES_ENV=stable" >> $GITHUB_ENV
          else
            sha_short=$(git rev-parse --short HEAD)

            echo "RELEASE_KIND=insiders" >> $GITHUB_ENV
            echo "RELEASE_CHANNEL=insiders" >> $GITHUB_ENV
            echo "SHA_SHORT=$sha_short" >> $GITHUB_ENV
            echo "INSIDERS_VERSION=0.0.0-insiders.$sha_short" >> $GITHUB_ENV
          fi

      - name: Setup WASM target
        run: rustup target add wasm32-wasip1-threads

      - name: Install dependencies
        run: pnpm --filter=!./playgrounds/* install --frozen-lockfile

      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: ${{ env.OXIDE_LOCATION }}

      - name: Move artifacts
        run: |
          cd ${{ env.OXIDE_LOCATION }}
          cp bindings-x86_64-pc-windows-msvc/* ./npm/win32-x64-msvc/
          cp bindings-aarch64-pc-windows-msvc/* ./npm/win32-arm64-msvc/
          cp bindings-x86_64-apple-darwin/* ./npm/darwin-x64/
          cp bindings-aarch64-apple-darwin/* ./npm/darwin-arm64/
          cp bindings-aarch64-linux-android/* ./npm/android-arm64/
          cp bindings-armv7-linux-androideabi/* ./npm/android-arm-eabi/
          cp bindings-aarch64-unknown-linux-gnu/* ./npm/linux-arm64-gnu/
          cp bindings-aarch64-unknown-linux-musl/* ./npm/linux-arm64-musl/
          cp bindings-armv7-unknown-linux-gnueabihf/* ./npm/linux-arm-gnueabihf/
          cp bindings-loongarch64-unknown-linux-gnu/* ./npm/linux-loong64-gnu/
          cp bindings-loongarch64-unknown-linux-musl/* ./npm/linux-loong64-musl/
          cp bindings-x86_64-unknown-linux-gnu/* ./npm/linux-x64-gnu/
          cp bindings-x86_64-unknown-linux-musl/* ./npm/linux-x64-musl/
          cp bindings-x86_64-unknown-freebsd/* ./npm/freebsd-x64/

      - name: 'Version based on commit: ${{ env.INSIDERS_VERSION }}'
        if: env.RELEASE_KIND == 'insiders'
        run: pnpm run version-packages ${{ env.INSIDERS_VERSION }}

      - name: Build Tailwind CSS
        if: env.RELEASE_KIND == 'insiders'
        run: pnpm run build

      - name: Build Tailwind CSS
        if: env.RELEASE_KIND == 'release'
        run: pnpm run build
        env:
          FEATURES_ENV: ${{ env.FEATURES_ENV }}

      - name: Run pre-publish optimizations scripts
        run: node ./scripts/pre-publish-optimizations.mjs

      - name: Lock pre-release versions
        run: node ./scripts/lock-pre-release-versions.mjs

      - name: Upload npm package tarballs
        uses: actions/upload-artifact@v6
        with:
          name: npm-package-tarballs
          path: dist/*.tgz

      - name: Publish
        run: |
          pnpm --recursive --filter="!@tailwindcss/oxide-wasm32-wasi" publish --tag ${RELEASE_CHANNEL} --no-git-checks
          # The wasm package needs a special npm config that isn't read when pnpm --recursive is used
          pushd crates/node/npm/wasm32-wasi; pnpm publish --tag ${RELEASE_CHANNEL} --no-git-checks --config.node-linker=hoisted; popd;
