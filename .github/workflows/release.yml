name: release
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build'
        required: false
        default: ''
  schedule:
    - cron: '0 10 * * *'

env:
  APP_NAME: tailwindcss-oxide
  NODE_VERSION: 24
  PNPM_VERSION: '11.9.0'
  OXIDE_LOCATION: ./crates/node

jobs:
  check:
    runs-on: ubuntu-slim
    outputs:
      version: ${{ steps.get-version.outputs.version }}
      build: ${{ steps.check-build.outputs.build }}
    steps:
      - name: Check Version
        id: get-version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            version="${{ inputs.version }}"
          else
            version=$(curl -s 'https://api.github.com/repos/tailwindlabs/tailwindcss/releases/latest' | jq -r ".tag_name")
          fi
          echo "Current Version: ${version}"
          if [ -z "${version}" ] || [ "${version}" == "null" ]; then
            echo "Failed to get version"
            exit 1
          fi
          echo "version=${version}" >> $GITHUB_ENV
          echo "version=${version}" >> $GITHUB_OUTPUT

      - name: Check Build
        id: check-build
        run: |
          gh release view ${version} -R ${{ github.repository }} >/dev/null 2>&1 || echo "build=1" >> $GITHUB_OUTPUT
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            strip: strip
            container:
              image: ghcr.io/napi-rs/napi-rs/nodejs-rust:lts-debian
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            strip: strip
            download: true
            container:
              image: ghcr.io/napi-rs/napi-rs/nodejs-rust:lts-alpine
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            strip: llvm-strip
            container:
              image: ghcr.io/napi-rs/napi-rs/nodejs-rust:lts-debian-aarch64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            strip: aarch64-linux-musl-strip
            download: true
            container:
              image: ghcr.io/napi-rs/napi-rs/nodejs-rust:lts-alpine
          - os: ubuntu-latest
            target: armv7-unknown-linux-gnueabihf
            strip: llvm-strip
            container:
              image: ghcr.io/napi-rs/napi-rs/nodejs-rust:lts-debian-zig
          - os: ubuntu-latest
            target: loongarch64-unknown-linux-gnu
            strip: llvm-strip
            container:
              image: ghcr.io/loong64/napi-rs/nodejs-rust:lts-debian
          - os: ubuntu-latest
            target: loongarch64-unknown-linux-musl
            strip: loongarch64-linux-musl-strip
            download: true
            container:
              image: ghcr.io/loong64/napi-rs/nodejs-rust:lts-alpine

    runs-on: ${{ matrix.os }}
    name: Build ${{ matrix.target }} (oxide)
    needs:
      - check
    if: needs.check.outputs.build == '1'
    env:
      version: ${{ needs.check.outputs.version }}
    container: ${{ matrix.container }}
    steps:
      - uses: actions/checkout@v6
        with:
          repository: tailwindlabs/tailwindcss
          ref: ${{ env.version }}

      - uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Use Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          package-manager-cache: false

      - name: Prepare build
        run: |
          wget -qO - https://github.com/${{ github.repository }}/raw/refs/heads/main/patch_loong64.patch | patch -p1
          cp -R crates/node/npm/linux-arm64-gnu crates/node/npm/linux-loong64-gnu 
          cp -R crates/node/npm/linux-arm64-musl crates/node/npm/linux-loong64-musl
          sed -i 's/aarch64/loongarch64/g' crates/node/npm/linux-loong64-musl/*
          sed -i 's/arm64/loong64/g' crates/node/npm/linux-loong64-gnu/*

          rm -rf crates/node/npm/{android,darwin,freebsd,win32}-*

      - name: Install gcc-arm-linux-gnueabihf
        if: ${{ matrix.target == 'armv7-unknown-linux-gnueabihf' }}
        run: |
          sudo apt-get update
          sudo apt-get install gcc-arm-linux-gnueabihf g++-arm-linux-gnueabihf -y

      # Cargo already skips downloading dependencies if they already exist
      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      # Cache the `oxide` Rust build
      - name: Cache oxide build
        uses: actions/cache@v5
        with:
          path: |
            ./crates/node/*.node
            ./crates/node/*.wasm
            ./crates/node/index.d.ts
            ./crates/node/index.js
            ./crates/node/browser.js
            ./crates/node/tailwindcss-oxide.wasi-browser.js
            ./crates/node/tailwindcss-oxide.wasi.cjs
            ./crates/node/wasi-worker-browser.mjs
            ./crates/node/wasi-worker.mjs
          key: ${{ runner.os }}-${{ matrix.target }}-oxide-${{ hashFiles('./crates/**/*') }}

      - name: Install Node.JS
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Rust (Stable)
        if: ${{ matrix.download }}
        run: |
          rustup default stable

      - name: Setup rust target
        run: rustup target add ${{ matrix.target }}

      - name: Install dependencies
        run: pnpm install --ignore-scripts --filter=!./playgrounds/*

      - name: Build release
        run: pnpm run --filter ${{ env.OXIDE_LOCATION }} build:platform --target=${{ matrix.target }}
        env:
          RUST_TARGET: ${{ matrix.target }}
          JEMALLOC_SYS_WITH_LG_PAGE: ${{ matrix.page-size }}

      - name: Strip debug symbols # https://github.com/rust-lang/rust/issues/46034
        if: ${{ matrix.strip }}
        run: ${{ matrix.strip }} ${{ env.OXIDE_LOCATION }}/*.node

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: bindings-${{ matrix.target }}
          path: ${{ env.OXIDE_LOCATION }}/*.node

  release:
    runs-on: macos-14
    name: Build and publish Tailwind CSS

    permissions:
      contents: write
      # https://docs.npmjs.com/generating-provenance-statements#publishing-packages-with-provenance-via-github-actions
      id-token: write

    needs:
      - check
      - build
    if: needs.check.outputs.build == '1'

    env:
      version: ${{ needs.check.outputs.version }}

    steps:
      - uses: actions/checkout@v6
        with:
          repository: tailwindlabs/tailwindcss
          ref: ${{ env.version }}

      - name: Prepare build
        run: |
          wget -qO - https://github.com/${{ github.repository }}/raw/refs/heads/main/patch_loong64.patch | patch -p1

      - uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Use Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      # npm trusted publishing validates the caller workflow filename, so all npm publishes live here.
      # This workflow rebuilds the publish artifacts instead of depending on prepare-release.yml.
      - name: Resolve release metadata
        env:
          INPUT_CHANNEL: "release"
        run: |
          if [[ "${{ github.event_name }}" == "release" || "$INPUT_CHANNEL" == "release" ]]; then
            release_channel=$(node ./scripts/release-channel.js)

            echo "RELEASE_KIND=release" >> $GITHUB_ENV
            echo "RELEASE_CHANNEL=$release_channel" >> $GITHUB_ENV
            echo "FEATURES_ENV=stable" >> $GITHUB_ENV
          else
            sha_short=$(git rev-parse --short HEAD)

            echo "RELEASE_KIND=insiders" >> $GITHUB_ENV
            echo "RELEASE_CHANNEL=insiders" >> $GITHUB_ENV
            echo "SHA_SHORT=$sha_short" >> $GITHUB_ENV
            echo "INSIDERS_VERSION=0.0.0-insiders.$sha_short" >> $GITHUB_ENV
          fi

      # Cargo already skips downloading dependencies if they already exist
      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      # Cache the `oxide` Rust build
      - name: Cache oxide build
        uses: actions/cache@v5
        with:
          path: |
            ./crates/node/*.node
            ./crates/node/*.wasm
            ./crates/node/index.d.ts
            ./crates/node/index.js
            ./crates/node/browser.js
            ./crates/node/tailwindcss-oxide.wasi-browser.js
            ./crates/node/tailwindcss-oxide.wasi.cjs
            ./crates/node/wasi-worker-browser.mjs
            ./crates/node/wasi-worker.mjs
          key: ${{ runner.os }}-${{ matrix.target }}-oxide-${{ hashFiles('./crates/**/*') }}

      - name: Setup WASM target
        run: rustup target add wasm32-wasip1-threads

      - name: Install dependencies
        run: pnpm --filter=!./playgrounds/* install

      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: ${{ env.OXIDE_LOCATION }}

      - name: Move artifacts
        run: |
          cd ${{ env.OXIDE_LOCATION }}
          cp bindings-aarch64-unknown-linux-gnu/* ./npm/linux-arm64-gnu/
          cp bindings-aarch64-unknown-linux-musl/* ./npm/linux-arm64-musl/
          cp bindings-armv7-unknown-linux-gnueabihf/* ./npm/linux-arm-gnueabihf/
          cp bindings-loongarch64-unknown-linux-gnu/* ./npm/linux-loong64-gnu/
          cp bindings-loongarch64-unknown-linux-musl/* ./npm/linux-loong64-musl/
          cp bindings-x86_64-unknown-linux-gnu/* ./npm/linux-x64-gnu/
          cp bindings-x86_64-unknown-linux-musl/* ./npm/linux-x64-musl/

      - name: 'Version based on commit: ${{ env.INSIDERS_VERSION }}'
        if: env.RELEASE_KIND == 'insiders'
        run: pnpm run version-packages ${{ env.INSIDERS_VERSION }}

      - name: Build Tailwind CSS
        if: env.RELEASE_KIND == 'insiders'
        run: pnpm run build

      - name: Build Tailwind CSS
        if: env.RELEASE_KIND == 'release'
        run: pnpm run build
        env:
          FEATURES_ENV: ${{ env.FEATURES_ENV }}

      - name: Run pre-publish optimizations scripts
        run: node ./scripts/pre-publish-optimizations.mjs

      - name: Lock pre-release versions
        run: node ./scripts/lock-pre-release-versions.mjs

      - name: Upload npm package tarballs
        uses: actions/upload-artifact@v6
        with:
          name: npm-package-tarballs
          path: dist/*.tgz

      - name: Publish
        run: |
          pnpm --recursive --filter="!@tailwindcss/oxide-wasm32-wasi" publish --tag ${{ env.RELEASE_CHANNEL }} --no-git-checks --dry-run
          # The wasm package needs a special npm config that isn't read when pnpm --recursive is used
          pushd crates/node/npm/wasm32-wasi; pnpm publish --tag ${{ env.RELEASE_CHANNEL }} --no-git-checks --dry-run; popd;

      - name: Make artifacts
        run: |
          mkdir -p release-assets
          find . -name "*.tgz" -exec mv {} release-assets/ \;
          find release-assets/ -type f -name "tailwindcss-oxide-*" ! -name "*loong64-*" -delete
          ls -lh release-assets/

      - name: Create release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG_NAME="${version}"
          gh release create "${TAG_NAME}" \
            --repo ${{ github.repository }} \
            --generate-notes \
            --title "${TAG_NAME}" \
            release-assets/*

  publish:
    runs-on: macos-14
    name: Build and publish Tailwind CSS

    permissions:
      contents: write
      # https://docs.npmjs.com/generating-provenance-statements#publishing-packages-with-provenance-via-github-actions
      id-token: write

    needs:
      - check
      - build
    if: needs.check.outputs.build == '1'

    env:
      version: ${{ needs.check.outputs.version }}

    steps:
      - uses: actions/checkout@v6
        with:
          repository: tailwindlabs/tailwindcss
          ref: ${{ env.version }}

      - name: Prepare build
        run: |
          wget -qO - https://github.com/${{ github.repository }}/raw/refs/heads/main/patch_loong64.patch | patch -p1
          find "${{ env.OXIDE_LOCATION }}/npm" -name package.json | xargs sed -i 's#"name": "@tailwindcss/#"name": "@loong64/#g'
          find "${{ env.OXIDE_LOCATION }}/npm" -name package.json | xargs sed -i 's#github.com/tailwindlabs#github.com/loong64#g'

      - uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Use Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      # npm trusted publishing validates the caller workflow filename, so all npm publishes live here.
      # This workflow rebuilds the publish artifacts instead of depending on prepare-release.yml.
      - name: Resolve release metadata
        env:
          INPUT_CHANNEL: "release"
        run: |
          if [[ "${{ github.event_name }}" == "release" || "$INPUT_CHANNEL" == "release" ]]; then
            release_channel=$(node ./scripts/release-channel.js)

            echo "RELEASE_KIND=release" >> $GITHUB_ENV
            echo "RELEASE_CHANNEL=$release_channel" >> $GITHUB_ENV
            echo "FEATURES_ENV=stable" >> $GITHUB_ENV
          else
            sha_short=$(git rev-parse --short HEAD)

            echo "RELEASE_KIND=insiders" >> $GITHUB_ENV
            echo "RELEASE_CHANNEL=insiders" >> $GITHUB_ENV
            echo "SHA_SHORT=$sha_short" >> $GITHUB_ENV
            echo "INSIDERS_VERSION=0.0.0-insiders.$sha_short" >> $GITHUB_ENV
          fi

      # Cargo already skips downloading dependencies if they already exist
      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      # Cache the `oxide` Rust build
      - name: Cache oxide build
        uses: actions/cache@v5
        with:
          path: |
            ./crates/node/*.node
            ./crates/node/*.wasm
            ./crates/node/index.d.ts
            ./crates/node/index.js
            ./crates/node/browser.js
            ./crates/node/tailwindcss-oxide.wasi-browser.js
            ./crates/node/tailwindcss-oxide.wasi.cjs
            ./crates/node/wasi-worker-browser.mjs
            ./crates/node/wasi-worker.mjs
          key: ${{ runner.os }}-${{ matrix.target }}-oxide-${{ hashFiles('./crates/**/*') }}

      - name: Setup WASM target
        run: rustup target add wasm32-wasip1-threads

      - name: Install dependencies
        run: pnpm --filter=!./playgrounds/* install

      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: ${{ env.OXIDE_LOCATION }}

      - name: Move artifacts
        run: |
          cd ${{ env.OXIDE_LOCATION }}
          cp bindings-aarch64-unknown-linux-gnu/* ./npm/linux-arm64-gnu/
          cp bindings-aarch64-unknown-linux-musl/* ./npm/linux-arm64-musl/
          cp bindings-loongarch64-unknown-linux-gnu/* ./npm/linux-loong64-gnu/
          cp bindings-loongarch64-unknown-linux-musl/* ./npm/linux-loong64-musl/
          cp bindings-x86_64-unknown-linux-gnu/* ./npm/linux-x64-gnu/
          cp bindings-x86_64-unknown-linux-musl/* ./npm/linux-x64-musl/

      - name: 'Version based on commit: ${{ env.INSIDERS_VERSION }}'
        if: env.RELEASE_KIND == 'insiders'
        run: pnpm run version-packages ${{ env.INSIDERS_VERSION }}

      - name: Build Tailwind CSS
        if: env.RELEASE_KIND == 'insiders'
        run: pnpm run build

      - name: Build Tailwind CSS
        if: env.RELEASE_KIND == 'release'
        run: pnpm run build
        env:
          FEATURES_ENV: ${{ env.FEATURES_ENV }}

      - name: Run pre-publish optimizations scripts
        run: node ./scripts/pre-publish-optimizations.mjs

      - name: Lock pre-release versions
        run: node ./scripts/lock-pre-release-versions.mjs

      - name: Upload npm package tarballs
        uses: actions/upload-artifact@v6
        with:
          name: npm-package-tarballs
          path: dist/*.tgz

      - name: Publish
        run: |
          pnpm --recursive --filter="!@tailwindcss/oxide-wasm32-wasi" publish --tag ${{ env.RELEASE_CHANNEL }} --no-git-checks
          # The wasm package needs a special npm config that isn't read when pnpm --recursive is used
          pushd crates/node/npm/wasm32-wasi; pnpm publish --tag ${{ env.RELEASE_CHANNEL }} --no-git-checks; popd;
